<style>

  .hero-gradient-overlay {
    background: radial-gradient(circle at top right, rgba(14, 165, 233, 0.15), transparent 60%);

  .search-hero-input {
    background-color: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);

    color: var(--text);
    padding: var(--space-2) var(--space-4);
    border-radius: var(--radius-lg);
    font-size: var(--text-xs);
    font-weight: 700;

  .filter-select:focus {
    outline: none;
    border-color: var(--primary);

<script>

  function loadLeaflet(callback) {
    if (window.L) {
      callback();
      return;
    }
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
    link.integrity = 'sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=';
    link.crossOrigin = '';
    document.head.appendChild(link);

    const script = document.createElement('script');
    script.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
    script.integrity = 'sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=';
    script.crossOrigin = '';
    script.onload = callback;
    document.head.appendChild(script);
  }

  if (mapToggleBtn) {
    mapToggleBtn.addEventListener('click', () => {
      const accordion = mapToggleBtn.closest('.accordion');
      const isExpanded = accordion.classList.contains('open');

      if (isExpanded) {
        loadLeaflet(() => {
          if (!mapInstance) {
            mapInstance = L.map('nationalMap', {
              scrollWheelZoom: false
            }).setView([30.0, 124.0], 5);

            // Base Layer
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
              attribution: 'Esri, Maxar',
              maxZoom: 17
            }).addTo(mapInstance);

            const DIFF_LABEL = { easy: '초급', medium: '중급', hard: '고급', expert: '전문가' };

            // Add Markers
            window.MOUNTAINS.forEach(m => {
              const markerColor = m.diff === 'easy' ? '#10b981' : 
                                  m.diff === 'medium' ? '#f97316' : 
                                  m.diff === 'hard' ? '#ef4444' : '#b91c1c';
                                  
              const marker = L.circleMarker([m.lat, m.lng], {
                radius: 7,
                fillColor: markerColor,
                color: '#fff',
                weight: 1.5,
                fillOpacity: 0.9
              });

              const popupHtml = `
                <div style="font-family: var(--font-body); padding: 4px;">
                  <h4 style="margin: 0 0 4px 0; font-size: 14px; font-weight: 800;">${m.name}</h4>
                  <div style="font-size: 11px; margin-bottom: 2px;">⛰️ 고도: <strong>${m.alt}</strong></div>
                  <div style="font-size: 11px; margin-bottom: 6px;">⚡ 난이도: <strong>${DIFF_LABEL[m.diff]}</strong></div>
                  ${m.done 
                    ? `<a href="${m.url}" style="font-size: 11px; font-weight: 700; color: var(--primary);">🗺️ 플레이북 바로가기</a>` 
                    : `<span style="font-size: 11px; color: var(--faint);">⏳ 플레이북 준비 중</span>`
                  }
                </div>
              `;

              marker.bindPopup(popupHtml);
              marker.addTo(mapInstance);
            });
          }
          
          // Fix Leaflet viewport dimensions
          setTimeout(() => {
            if (mapInstance) mapInstance.invalidateSize();
          }, 150);
        });
      }
    });
  }
});
</script>
</body>
</html>
