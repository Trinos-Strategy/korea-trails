<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">

<title>한국의 산 — 전국 등산 플레이북</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=cabinet-grotesk@700,800&display=swap" rel="stylesheet">
<style>
:root,[data-theme="light"]{
  --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;
  --color-surface-offset:#f3f0ec;--color-surface-dynamic:#e6e4df;
  --color-divider:#dcd9d5;--color-border:#d4d1ca;
  --color-text:#28251d;--color-text-muted:#7a7974;--color-text-faint:#bab9b4;
  --color-primary:#01696f;--color-primary-hover:#0c4e54;
  --color-primary-highlight:#cedcd8;
  --color-success:#437a22;--color-success-highlight:#d4dfcc;
  --color-gold:#d19900;--color-gold-highlight:#e9e0c6;
  --color-warning:#964219;--color-warning-highlight:#ddcfc6;
  --color-error:#a12c7b;--color-orange:#da7101;
  --shadow-sm:0 1px 2px oklch(0.2 0.01 80/0.06);
  --shadow-md:0 4px 12px oklch(0.2 0.01 80/0.08);
  --shadow-lg:0 12px 32px oklch(0.2 0.01 80/0.12);
  --radius-sm:0.375rem;--radius-md:0.5rem;--radius-lg:0.75rem;--radius-xl:1rem;--radius-full:9999px;
  --font-body:'Satoshi',sans-serif;--font-display:'Cabinet Grotesk',sans-serif;
  --text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);
  --text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);
  --text-base:clamp(1rem,0.95rem + 0.25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem + 0.75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
  --text-2xl:clamp(2rem,1.2rem + 2.5vw,3.5rem);
  --space-1:0.25rem;--space-2:0.5rem;--space-3:0.75rem;--space-4:1rem;
  --space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;
  --space-12:3rem;--space-16:4rem;
  --transition:180ms cubic-bezier(0.16,1,0.3,1);
}
[data-theme="dark"]{
  --color-bg:#0f0e0d;--color-surface:#161514;--color-surface-2:#1c1b19;
  --color-surface-offset:#1d1c1a;--color-surface-dynamic:#2d2c2a;
  --color-divider:#242321;--color-border:#353432;
  --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#4a4948;
  --color-primary:#4f98a3;--color-primary-hover:#227f8b;
  --color-primary-highlight:#1e3234;
  --color-success:#6daa45;--color-success-highlight:#263321;
  --color-gold:#e8af34;--color-gold-highlight:#2e2718;
  --color-warning:#bb653b;--color-warning-highlight:#2a1c12;
  --color-error:#d163a7;--color-orange:#fdab43;
  --shadow-sm:0 1px 2px oklch(0 0 0/0.3);
  --shadow-md:0 4px 12px oklch(0 0 0/0.4);
  --shadow-lg:0 12px 32px oklch(0 0 0/0.5);
}
@media(prefers-color-scheme:dark){:root:not([data-theme]){
  --color-bg:#0f0e0d;--color-surface:#161514;--color-surface-2:#1c1b19;
  --color-surface-offset:#1d1c1a;--color-surface-dynamic:#2d2c2a;
  --color-divider:#242321;--color-border:#353432;
  --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#4a4948;
  --color-primary:#4f98a3;--color-primary-hover:#227f8b;--color-primary-highlight:#1e3234;
  --color-success:#6daa45;--color-success-highlight:#263321;
  --color-gold:#e8af34;--color-gold-highlight:#2e2718;
  --color-warning:#bb653b;--color-warning-highlight:#2a1c12;
  --color-error:#d163a7;--color-orange:#fdab43;
}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;}
body{font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);min-height:100dvh;line-height:1.6;}
img,svg{display:block;max-width:100%;}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit;}
a,button,[role="button"]{transition:color var(--transition),background var(--transition),border-color var(--transition),box-shadow var(--transition);}
.site-header{position:sticky;top:0;z-index:100;background:var(--color-bg);border-bottom:1px solid var(--color-divider);padding:var(--space-3) var(--space-6);display:flex;align-items:center;justify-content:space-between;gap:var(--space-4);}
.logo-wrap{display:flex;align-items:center;gap:var(--space-3);}
.logo-svg{width:36px;height:36px;flex-shrink:0;}
.logo-text{font-family:var(--font-display);font-size:var(--text-lg);font-weight:800;line-height:1;}
.header-right{display:flex;align-items:center;gap:var(--space-3);}
.theme-btn{width:36px;height:36px;border-radius:var(--radius-full);display:flex;align-items:center;justify-content:center;background:var(--color-surface-offset);color:var(--color-text-muted);}
.theme-btn:hover{background:var(--color-surface-dynamic);color:var(--color-text);}
.hero{padding:var(--space-12) var(--space-6) var(--space-8);text-align:center;background:linear-gradient(180deg,var(--color-surface) 0%,var(--color-bg) 100%);border-bottom:1px solid var(--color-divider);}
.hero-badge{display:inline-flex;align-items:center;gap:var(--space-2);background:var(--color-primary-highlight);color:var(--color-primary);padding:var(--space-1) var(--space-3);border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:700;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:var(--space-4);}
.hero h1{font-family:var(--font-display);font-size:var(--text-2xl);font-weight:800;line-height:1.1;margin-bottom:var(--space-4);}
.hero p{font-size:var(--text-base);color:var(--color-text-muted);max-width:56ch;margin:0 auto var(--space-8);}
.hero-stats{display:flex;gap:var(--space-6);justify-content:center;flex-wrap:wrap;margin-bottom:var(--space-6);}
.hero-stat{text-align:center;}
.hero-stat-value{font-family:var(--font-display);font-size:var(--text-xl);font-weight:800;color:var(--color-primary);line-height:1;}
.hero-stat-label{font-size:var(--text-xs);color:var(--color-text-muted);margin-top:var(--space-1);}
.grid-section{max-width:1200px;margin:0 auto;padding:var(--space-8) var(--space-6) var(--space-12);}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-6);}
.section-title{font-family:var(--font-display);font-size:var(--text-xl);font-weight:800;}
.mountain-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:var(--space-4);}
.mountain-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);overflow:hidden;transition:all var(--transition);}
.mountain-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
.card-header{padding:var(--space-5);border-bottom:1px solid var(--color-divider);}
.card-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-2);}
.card-name{font-family:var(--font-display);font-size:var(--text-lg);font-weight:800;}
.card-alt{font-family:var(--font-display);font-size:var(--text-lg);font-weight:700;color:var(--color-primary);}
.card-region{font-size:var(--text-xs);color:var(--color-text-muted);font-weight:600;}
.card-body{padding:var(--space-4) var(--space-5);}
.card-stats{display:flex;gap:var(--space-4);margin-bottom:var(--space-4);}
.card-stat{flex:1;}
.card-stat-label{font-size:var(--text-xs);color:var(--color-text-muted);margin-bottom:2px;}
.card-stat-value{font-weight:700;font-size:var(--text-sm);}
.card-desc{font-size:var(--text-sm);color:var(--color-text-muted);line-height:1.6;margin-bottom:var(--space-4);}
.card-footer{padding:0 var(--space-5) var(--space-5);}
.card-playbook-btn{display:flex;align-items:center;justify-content:center;gap:var(--space-2);background:var(--color-orange);color:#fff;padding:var(--space-3) var(--space-5);border-radius:var(--radius-full);font-weight:700;font-size:var(--text-sm);text-decoration:none;transition:all var(--transition);}
.card-playbook-btn:hover{filter:brightness(1.1);}
.card-pending-tag{display:flex;align-items:center;justify-content:center;gap:var(--space-2);background:var(--color-surface-offset);color:var(--color-text-faint);padding:var(--space-3) var(--space-5);border-radius:var(--radius-full);font-weight:600;font-size:var(--text-sm);}
.diff-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:700;}
.diff-easy{background:var(--color-success-highlight);color:var(--color-success);}
.diff-medium{background:var(--color-gold-highlight);color:var(--color-gold);}
.diff-hard{background:var(--color-warning-highlight);color:var(--color-warning);}
.diff-expert{background:#f0d0e8;color:var(--color-error);}
.section-divider{font-family:var(--font-display);font-size:var(--text-sm);font-weight:700;color:var(--color-text-muted);padding:var(--space-6) 0 var(--space-3);border-top:1px solid var(--color-divider);margin-top:var(--space-4);grid-column:1/-1;letter-spacing:0.05em;text-transform:uppercase;}
@media(max-width:640px){
  .site-header{padding:var(--space-3) var(--space-4);}
  .grid-section{padding-left:var(--space-4);padding-right:var(--space-4);}
  .hero{padding:var(--space-8) var(--space-4) var(--space-6);}
  .mountain-grid{grid-template-columns:1fr;}
}

/* --- MOUNTAIN CARD THUMBNAIL --- */
.card-thumbnail-wrap {
  position: relative;
  width: 100%;
  height: 160px;
  overflow: hidden;
  background-color: var(--color-surface-offset, var(--surfaceoff, #f3f0ec));
  border-bottom: 1px solid var(--color-divider, var(--divider, var(--div, #dcd9d5)));
}

.card-thumbnail {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  transition: transform var(--transition, 180ms ease);
}

.mountain-card:hover .card-thumbnail {
  transform: scale(1.04);
}

@media (prefers-reduced-motion: reduce) {
  .mountain-card:hover .card-thumbnail {
    transform: none;
  }
}
</style>
</head>

  {id:'myeongseongsan',name:'명성산',     alt:'922m',   region:'경기', dist:'8km',  time:'4-5시간',  diff:'medium', done:true,  url:'myeongseongsan-playbook.html',desc:'포천·철원 경계 명성산. 억새 군락 가을 산행 명소. 산정호수 연계.'},
  {id:'taebaeksan',    name:'태백산',     alt:'1,567m', region:'강원', dist:'10km', time:'5-6시간',  diff:'medium', done:true,  url:'taebaeksan-playbook.html',    desc:'태백고원 천제단. 겨울 설경과 주목 군락지. 백두대간 핵심 구간.'},
  // ── 대만 명산 ──
  {id:'yushan',        name:'위산(玉山)', alt:'3,952m', region:'대만', dist:'11km', time:'1박2일',   diff:'expert', done:true,  url:'yushan-playbook.html',        desc:'대만 최고봉·동북아 최고점. 배운산장 숙박 후 일출 정상 도전. 사전 허가 필수.'},
  {id:'xueshan',       name:'설산(雪山)', alt:'3,886m', region:'대만', dist:'11km', time:'1박2일',   diff:'expert', done:true,  url:'xueshan-playbook.html',       desc:'대만 제2봉. 칠성담(七星潭) 빙하 지형과 고산 식물대. 타이중·리산 접근.'},

];
const DIFF_LABEL = {easy:'초급',medium:'중급',hard:'고급',expert:'전문가'};
const DIFF_CLASS = {easy:'diff-easy',medium:'diff-medium',hard:'diff-hard',expert:'diff-expert'};
function renderGrid(){
  const grid = document.getElementById('mountainGrid');
  const korea = MOUNTAINS.filter(m => m.region !== '대만');
  const taiwan = MOUNTAINS.filter(m => m.region === '대만');
  const renderCard = m => `
  <div class="mountain-card">
    <!-- Card Top Photographic Thumbnail -->
    <div class="card-thumbnail-wrap">
      <picture>
        <source srcset="assets/img/${m.id}/g1-640.webp" type="image/webp">
        <img 
          src="assets/img/${m.id}/g1-640.jpg" 
          alt="${m.name} 등산로 전경" 
          class="card-thumbnail" 
          loading="lazy" 
          decoding="async">
      </picture>
    </div>
    <div class="card-header">
        <div class="card-title-row">
          <span class="card-name">${m.name}</span>
          <span class="card-alt">${m.alt}</span>
        </div>
        <div style="display:flex;align-items:center;gap:var(--space-2);">
          <span class="card-region">${m.region}</span>
          <span class="diff-badge ${DIFF_CLASS[m.diff]}">${DIFF_LABEL[m.diff]}</span>
          ${m.done ? '<span style="font-size:var(--text-xs);background:var(--color-orange);color:#fff;padding:2px 8px;border-radius:var(--radius-full);font-weight:700;">플레이북 ✓</span>' : ''}
        </div>
      </div>
      <div class="card-body">
        <div class="card-stats">
          <div class="card-stat">
            <div class="card-stat-label">거리</div>
            <div class="card-stat-value">🥾 ${m.dist}</div>
          </div>
          <div class="card-stat">
            <div class="card-stat-label">소요시간</div>
            <div class="card-stat-value">⏱ ${m.time}</div>
          </div>
        </div>
        <p class="card-desc">${m.desc}</p>
      </div>
      <div class="card-footer">
        ${m.done
          ? `<a href="${m.url}" class="card-playbook-btn">🗺 플레이북 보기</a>`
          : `<div class="card-pending-tag">⏳ 플레이북 준비 중</div>`
        }
      </div>
    </div>
  `;
  grid.innerHTML =
    korea.map(renderCard).join('') +
    `<div class="section-divider">🌏 해외 명산 — 대만</div>` +
    taiwan.map(renderCard).join('');
}
const t = document.querySelector('[data-theme-toggle]');
const r = document.documentElement;
let d = r.getAttribute('data-theme') === 'dark';
function updateIcon(){
  if(!t) return;
  t.innerHTML = d
    ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`
    : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
}
if(t){t.addEventListener('click',()=>{d=!d;r.setAttribute('data-theme',d?'dark':'light');updateIcon();});}
updateIcon();
renderGrid();
</script>
</body>
</html>
